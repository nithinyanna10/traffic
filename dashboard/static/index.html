<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL-Traffic-Control Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2234;
            --bg-card-hover: #1f2a40;
            --border: #2a3a55;
            --text-primary: #e8ecf4;
            --text-secondary: #8892a8;
            --text-muted: #5a6478;
            --accent-green: #22d67a;
            --accent-yellow: #f5a623;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-cyan: #06b6d4;
            --glow-green: rgba(34, 214, 122, 0.3);
            --glow-red: rgba(239, 68, 68, 0.3);
            --glow-yellow: rgba(245, 166, 35, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
        }
        .header-status {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-red);
            animation: pulse-dot 2s infinite;
        }
        .status-dot.active { background: var(--accent-green); }
        .status-text { font-size: 13px; color: var(--text-secondary); font-family: 'JetBrains Mono', monospace; }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Controls */
        .controls {
            padding: 12px 24px;
            display: flex;
            gap: 10px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }
        .btn {
            padding: 8px 20px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { background: var(--bg-card-hover); border-color: var(--accent-blue); }
        .btn.primary { background: var(--accent-blue); border-color: var(--accent-blue); }
        .btn.primary:hover { background: #2563eb; }
        .btn.danger { border-color: var(--accent-red); color: var(--accent-red); }
        .btn.danger:hover { background: rgba(239, 68, 68, 0.1); }

        /* Grid layout */
        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: auto auto;
            gap: 16px;
            padding: 16px 24px;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }
        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
        }
        .panel-body { padding: 16px; }
        .panel.full-width { grid-column: span 2; }

        /* Cluster map canvas */
        #clusterCanvas {
            width: 100%;
            height: 350px;
            display: block;
        }

        /* Queue bars */
        .queue-bars { display: flex; gap: 12px; align-items: flex-end; height: 180px; padding: 0 8px; }
        .queue-bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .queue-bar-container { width: 100%; height: 150px; background: var(--bg-secondary); border-radius: 6px; position: relative; overflow: hidden; }
        .queue-bar {
            position: absolute; bottom: 0; width: 100%;
            border-radius: 6px 6px 0 0;
            transition: height 0.3s ease, background 0.3s ease;
        }
        .queue-label { font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; text-align: center; }
        .queue-value { font-size: 11px; color: var(--text-primary); font-weight: 600; font-family: 'JetBrains Mono', monospace; }

        /* Heatmap */
        #heatmapCanvas {
            width: 100%;
            height: 200px;
            display: block;
        }

        /* Time series */
        #timeSeriesCanvas {
            width: 100%;
            height: 250px;
            display: block;
        }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 12px;
            padding: 0 24px 16px;
        }
        .stat-card {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
        }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .stat-value { font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
        .stat-value.green { color: var(--accent-green); }
        .stat-value.yellow { color: var(--accent-yellow); }
        .stat-value.red { color: var(--accent-red); }
        .stat-value.blue { color: var(--accent-blue); }
        .stat-value.purple { color: var(--accent-purple); }
    </style>
</head>
<body>
    <div class="header">
        <h1>⚡ RL-Traffic-Control</h1>
        <div class="header-status">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Disconnected</span>
        </div>
    </div>

    <div class="controls">
        <button class="btn primary" onclick="startTraining('ppo')">▶ Train PPO</button>
        <button class="btn" onclick="startTraining('round_robin')">Round Robin</button>
        <button class="btn" onclick="startTraining('least_connections')">Least Conn.</button>
        <button class="btn" onclick="startTraining('latency_heuristic')">Latency Heur.</button>
        <button class="btn danger" onclick="stopTraining()">■ Stop</button>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">Success Rate</div>
            <div class="stat-value green" id="statSuccessRate">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Avg Latency</div>
            <div class="stat-value yellow" id="statLatency">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Avg Cost</div>
            <div class="stat-value purple" id="statCost">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Alive Services</div>
            <div class="stat-value blue" id="statAlive">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Episode</div>
            <div class="stat-value" id="statEpisode">—</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Ep. Reward</div>
            <div class="stat-value green" id="statReward">—</div>
        </div>
    </div>

    <div class="dashboard">
        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">🗺 Live Cluster Map</span>
            </div>
            <div class="panel-body">
                <canvas id="clusterCanvas"></canvas>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">📊 Queue Sizes</span>
            </div>
            <div class="panel-body">
                <div class="queue-bars" id="queueBars"></div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">🎯 Policy Heatmap</span>
            </div>
            <div class="panel-body">
                <canvas id="heatmapCanvas"></canvas>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span class="panel-title">📈 Time Series</span>
            </div>
            <div class="panel-body">
                <canvas id="timeSeriesCanvas"></canvas>
            </div>
        </div>
    </div>

    <script>
    // ======================================================================
    // STATE
    // ======================================================================
    let ws = null;
    let connected = false;
    const MAX_HISTORY = 300;
    const history = { latency: [], cost: [], reward: [], successRate: [] };
    const particles = [];
    const cascadePulses = [];
    let actionCounts = new Array(9).fill(0);
    let totalActions = 0;

    const SERVICE_NAMES = ['Fast GPU', 'Cheap CPU', 'Flaky Spot', 'Serverless', 'Queue Cluster'];
    const SERVICE_COLORS = ['#3b82f6', '#22d67a', '#f5a623', '#8b5cf6', '#06b6d4'];

    // ======================================================================
    // WEBSOCKET
    // ======================================================================
    function connectWS() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws/state`);

        ws.onopen = () => {
            connected = true;
            document.getElementById('statusDot').classList.add('active');
            document.getElementById('statusText').textContent = 'Connected';
        };

        ws.onclose = () => {
            connected = false;
            document.getElementById('statusDot').classList.remove('active');
            document.getElementById('statusText').textContent = 'Disconnected';
            setTimeout(connectWS, 2000);
        };

        ws.onmessage = (e) => {
            try {
                const data = JSON.parse(e.data);
                onStateUpdate(data);
            } catch (err) {}
        };
    }

    function onStateUpdate(data) {
        updateStats(data);
        updateQueueBars(data);
        pushHistory(data);
        updateClusterMap(data);

        // Track action distribution
        if (data.current_action !== undefined && data.current_action !== null) {
            const a = data.current_action;
            if (a >= 0 && a < 9) {
                actionCounts[a]++;
                totalActions++;
            }
            // Spawn particle for routing actions
            if (a >= 0 && a <= 4) {
                spawnParticle(a, data.services ? data.services[a] : null);
            }
        }
        // Cascade pulse
        if (data.services) {
            data.services.forEach((s, i) => {
                if (!s.alive || s.health < 0.1) {
                    spawnCascadePulse(i);
                }
            });
        }
    }

    // ======================================================================
    // STATS PANEL
    // ======================================================================
    function updateStats(data) {
        const sr = data.success_rate;
        const el = (id, val) => document.getElementById(id).textContent = val;
        el('statSuccessRate', sr !== undefined ? (sr * 100).toFixed(1) + '%' : '—');
        el('statLatency', data.avg_latency !== undefined ? data.avg_latency.toFixed(1) + 'ms' : '—');
        el('statCost', data.avg_cost !== undefined ? '$' + data.avg_cost.toFixed(4) : '—');
        el('statAlive', data.alive_services !== undefined ? data.alive_services + '/5' : '—');
        el('statEpisode', data.episode !== undefined ? data.episode : '—');
        el('statReward', data.episode_reward !== undefined ? data.episode_reward.toFixed(1) : '—');

        // Color success rate
        const srEl = document.getElementById('statSuccessRate');
        srEl.className = 'stat-value ' + (sr > 0.8 ? 'green' : sr > 0.5 ? 'yellow' : 'red');
    }

    // ======================================================================
    // QUEUE BARS
    // ======================================================================
    function updateQueueBars(data) {
        const container = document.getElementById('queueBars');
        if (!data.services) return;

        if (container.children.length === 0) {
            data.services.forEach((s, i) => {
                const group = document.createElement('div');
                group.className = 'queue-bar-group';
                group.innerHTML = `
                    <div class="queue-value" id="qv${i}">0</div>
                    <div class="queue-bar-container">
                        <div class="queue-bar" id="qb${i}"></div>
                    </div>
                    <div class="queue-label">${SERVICE_NAMES[i]}</div>
                `;
                container.appendChild(group);
            });
        }

        data.services.forEach((s, i) => {
            const bar = document.getElementById(`qb${i}`);
            const val = document.getElementById(`qv${i}`);
            const pct = Math.min(s.queue / 25, 1) * 100;
            bar.style.height = pct + '%';

            const color = s.health > 0.7 ? SERVICE_COLORS[i] :
                          s.health > 0.3 ? 'var(--accent-yellow)' : 'var(--accent-red)';
            bar.style.background = `linear-gradient(to top, ${color}, ${color}88)`;
            val.textContent = s.queue;
        });
    }

    // ======================================================================
    // HISTORY
    // ======================================================================
    function pushHistory(data) {
        if (data.avg_latency !== undefined) history.latency.push(data.avg_latency);
        if (data.avg_cost !== undefined) history.cost.push(data.avg_cost);
        if (data.episode_reward !== undefined) history.reward.push(data.episode_reward);
        if (data.success_rate !== undefined) history.successRate.push(data.success_rate);

        for (const k in history) {
            if (history[k].length > MAX_HISTORY) history[k] = history[k].slice(-MAX_HISTORY);
        }
    }

    // ======================================================================
    // CLUSTER MAP (Canvas)
    // ======================================================================
    const clusterCanvas = document.getElementById('clusterCanvas');
    const clusterCtx = clusterCanvas.getContext('2d');

    const NODE_RADIUS = 32;
    let nodePositions = [];
    let lastServices = null;

    function initNodePositions() {
        const w = clusterCanvas.width;
        const h = clusterCanvas.height;
        const cx = w / 2, cy = h / 2;
        const rx = w * 0.32, ry = h * 0.34;
        nodePositions = SERVICE_NAMES.map((_, i) => {
            const angle = (i / 5) * Math.PI * 2 - Math.PI / 2;
            return { x: cx + Math.cos(angle) * rx, y: cy + Math.sin(angle) * ry };
        });
    }

    function spawnParticle(targetIdx, svc) {
        const cx = clusterCanvas.width / 2;
        const cy = clusterCanvas.height / 2;
        if (!nodePositions.length) return;
        const target = nodePositions[targetIdx];
        particles.push({
            x: cx, y: cy,
            tx: target.x, ty: target.y,
            progress: 0,
            speed: 0.03 + Math.random() * 0.02,
            color: svc && svc.alive ? SERVICE_COLORS[targetIdx] : '#ef4444',
            alive: true,
        });
        if (particles.length > 60) particles.splice(0, 10);
    }

    function spawnCascadePulse(idx) {
        if (!nodePositions.length) return;
        const pos = nodePositions[idx];
        cascadePulses.push({
            x: pos.x, y: pos.y,
            radius: NODE_RADIUS,
            maxRadius: NODE_RADIUS * 4,
            alpha: 0.8,
        });
        if (cascadePulses.length > 20) cascadePulses.splice(0, 5);
    }

    function updateClusterMap(data) {
        if (data.services) lastServices = data.services;
    }

    function drawClusterMap() {
        const w = clusterCanvas.width;
        const h = clusterCanvas.height;
        clusterCtx.clearRect(0, 0, w, h);

        if (!nodePositions.length) return;

        // Draw connections (lines between nodes)
        clusterCtx.strokeStyle = 'rgba(42, 58, 85, 0.5)';
        clusterCtx.lineWidth = 1;
        for (let i = 0; i < 5; i++) {
            for (let j = i + 1; j < 5; j++) {
                clusterCtx.beginPath();
                clusterCtx.moveTo(nodePositions[i].x, nodePositions[i].y);
                clusterCtx.lineTo(nodePositions[j].x, nodePositions[j].y);
                clusterCtx.stroke();
            }
        }

        // Draw center (load balancer)
        const cx = w / 2, cy = h / 2;
        clusterCtx.beginPath();
        clusterCtx.arc(cx, cy, 16, 0, Math.PI * 2);
        clusterCtx.fillStyle = 'var(--bg-secondary)';
        clusterCtx.fill();
        clusterCtx.strokeStyle = '#3b82f6';
        clusterCtx.lineWidth = 2;
        clusterCtx.stroke();
        clusterCtx.fillStyle = '#e8ecf4';
        clusterCtx.font = '10px JetBrains Mono';
        clusterCtx.textAlign = 'center';
        clusterCtx.textBaseline = 'middle';
        clusterCtx.fillText('LB', cx, cy);

        // Draw cascade pulses
        for (let i = cascadePulses.length - 1; i >= 0; i--) {
            const p = cascadePulses[i];
            p.radius += 2;
            p.alpha -= 0.02;
            if (p.alpha <= 0) { cascadePulses.splice(i, 1); continue; }
            clusterCtx.beginPath();
            clusterCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            clusterCtx.strokeStyle = `rgba(239, 68, 68, ${p.alpha})`;
            clusterCtx.lineWidth = 2;
            clusterCtx.stroke();
        }

        // Draw particles
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.progress += p.speed;
            if (p.progress >= 1) { particles.splice(i, 1); continue; }
            const x = p.x + (p.tx - p.x) * p.progress;
            const y = p.y + (p.ty - p.y) * p.progress;
            clusterCtx.beginPath();
            clusterCtx.arc(x, y, 4, 0, Math.PI * 2);
            clusterCtx.fillStyle = p.color;
            clusterCtx.fill();
            // Glow
            clusterCtx.beginPath();
            clusterCtx.arc(x, y, 8, 0, Math.PI * 2);
            clusterCtx.fillStyle = p.color + '33';
            clusterCtx.fill();
        }

        // Draw nodes
        if (lastServices) {
            lastServices.forEach((s, i) => {
                const pos = nodePositions[i];
                const health = s.health;
                const color = health > 0.7 ? SERVICE_COLORS[i] :
                              health > 0.3 ? '#f5a623' : '#ef4444';
                const glowColor = health > 0.7 ? SERVICE_COLORS[i] + '40' :
                                  health > 0.3 ? 'rgba(245,166,35,0.25)' : 'rgba(239,68,68,0.3)';

                // Glow
                clusterCtx.beginPath();
                clusterCtx.arc(pos.x, pos.y, NODE_RADIUS + 8, 0, Math.PI * 2);
                clusterCtx.fillStyle = glowColor;
                clusterCtx.fill();

                // Node circle
                clusterCtx.beginPath();
                clusterCtx.arc(pos.x, pos.y, NODE_RADIUS, 0, Math.PI * 2);
                clusterCtx.fillStyle = '#1a2234';
                clusterCtx.fill();
                clusterCtx.strokeStyle = color;
                clusterCtx.lineWidth = 3;
                clusterCtx.stroke();

                // Health arc
                clusterCtx.beginPath();
                clusterCtx.arc(pos.x, pos.y, NODE_RADIUS - 4, -Math.PI / 2, -Math.PI / 2 + health * Math.PI * 2);
                clusterCtx.strokeStyle = color;
                clusterCtx.lineWidth = 3;
                clusterCtx.stroke();

                // Label
                clusterCtx.fillStyle = '#e8ecf4';
                clusterCtx.font = '9px JetBrains Mono';
                clusterCtx.textAlign = 'center';
                clusterCtx.fillText(SERVICE_NAMES[i], pos.x, pos.y - 4);
                clusterCtx.fillStyle = color;
                clusterCtx.font = '10px JetBrains Mono';
                clusterCtx.fillText((health * 100).toFixed(0) + '%', pos.x, pos.y + 10);

                // Dead X
                if (!s.alive) {
                    clusterCtx.strokeStyle = '#ef4444';
                    clusterCtx.lineWidth = 3;
                    const d = 14;
                    clusterCtx.beginPath();
                    clusterCtx.moveTo(pos.x - d, pos.y - d);
                    clusterCtx.lineTo(pos.x + d, pos.y + d);
                    clusterCtx.moveTo(pos.x + d, pos.y - d);
                    clusterCtx.lineTo(pos.x - d, pos.y + d);
                    clusterCtx.stroke();
                }
            });
        }
    }

    // ======================================================================
    // POLICY HEATMAP (Canvas)
    // ======================================================================
    const heatmapCanvas = document.getElementById('heatmapCanvas');
    const heatmapCtx = heatmapCanvas.getContext('2d');

    const ACTION_NAMES = ['GPU', 'CPU', 'Spot', 'Srvls', 'Queue', 'Delay', 'Retry', 'Drop', 'Degrd'];

    function drawHeatmap() {
        const w = heatmapCanvas.width;
        const h = heatmapCanvas.height;
        heatmapCtx.clearRect(0, 0, w, h);

        if (totalActions === 0) {
            heatmapCtx.fillStyle = '#5a6478';
            heatmapCtx.font = '14px Inter';
            heatmapCtx.textAlign = 'center';
            heatmapCtx.fillText('Waiting for data...', w / 2, h / 2);
            return;
        }

        const padding = { top: 30, right: 20, bottom: 40, left: 20 };
        const barW = (w - padding.left - padding.right) / 9;
        const maxPct = Math.max(...actionCounts.map(c => c / totalActions), 0.01);

        ACTION_NAMES.forEach((name, i) => {
            const pct = actionCounts[i] / totalActions;
            const barH = (pct / maxPct) * (h - padding.top - padding.bottom);
            const x = padding.left + i * barW;
            const y = h - padding.bottom - barH;

            // Color based on action type
            let color;
            if (i < 5) color = SERVICE_COLORS[i];
            else if (i === 5) color = '#8892a8';
            else if (i === 6) color = '#f5a623';
            else if (i === 7) color = '#ef4444';
            else color = '#8b5cf6';

            // Bar
            const grad = heatmapCtx.createLinearGradient(x, y, x, h - padding.bottom);
            grad.addColorStop(0, color);
            grad.addColorStop(1, color + '44');
            heatmapCtx.fillStyle = grad;
            heatmapCtx.fillRect(x + 4, y, barW - 8, barH);

            // Glow top
            heatmapCtx.fillStyle = color + '33';
            heatmapCtx.fillRect(x + 2, y - 2, barW - 4, 4);

            // Percentage label
            heatmapCtx.fillStyle = '#e8ecf4';
            heatmapCtx.font = '10px JetBrains Mono';
            heatmapCtx.textAlign = 'center';
            heatmapCtx.fillText((pct * 100).toFixed(1) + '%', x + barW / 2, y - 8);

            // Action name
            heatmapCtx.fillStyle = '#8892a8';
            heatmapCtx.font = '9px JetBrains Mono';
            heatmapCtx.fillText(name, x + barW / 2, h - padding.bottom + 16);
        });

        // Title
        heatmapCtx.fillStyle = '#8892a8';
        heatmapCtx.font = '11px Inter';
        heatmapCtx.textAlign = 'left';
        heatmapCtx.fillText('Action Distribution (' + totalActions + ' total)', padding.left, 16);
    }

    // ======================================================================
    // TIME SERIES (Canvas)
    // ======================================================================
    const tsCanvas = document.getElementById('timeSeriesCanvas');
    const tsCtx = tsCanvas.getContext('2d');

    function drawTimeSeries() {
        const w = tsCanvas.width;
        const h = tsCanvas.height;
        tsCtx.clearRect(0, 0, w, h);

        const pad = { top: 24, right: 16, bottom: 30, left: 50 };
        const plotW = w - pad.left - pad.right;
        const plotH = h - pad.top - pad.bottom;

        // Draw axes
        tsCtx.strokeStyle = '#2a3a55';
        tsCtx.lineWidth = 1;
        tsCtx.beginPath();
        tsCtx.moveTo(pad.left, pad.top);
        tsCtx.lineTo(pad.left, h - pad.bottom);
        tsCtx.lineTo(w - pad.right, h - pad.bottom);
        tsCtx.stroke();

        const series = [
            { data: history.successRate, color: '#22d67a', label: 'Success %', scale: 1 },
            { data: history.latency, color: '#f5a623', label: 'Latency', scale: null },
            { data: history.cost, color: '#8b5cf6', label: 'Cost', scale: null },
        ];

        // Legend
        let lx = pad.left;
        series.forEach(s => {
            tsCtx.fillStyle = s.color;
            tsCtx.fillRect(lx, 8, 12, 3);
            tsCtx.fillStyle = '#8892a8';
            tsCtx.font = '10px Inter';
            tsCtx.textAlign = 'left';
            tsCtx.fillText(s.label, lx + 16, 13);
            lx += tsCtx.measureText(s.label).width + 36;
        });

        series.forEach(s => {
            if (s.data.length < 2) return;
            const data = s.data;
            const maxVal = s.scale || Math.max(...data, 0.001);

            tsCtx.beginPath();
            tsCtx.strokeStyle = s.color;
            tsCtx.lineWidth = 1.5;

            data.forEach((v, i) => {
                const x = pad.left + (i / (data.length - 1)) * plotW;
                const y = h - pad.bottom - (Math.min(v / maxVal, 1)) * plotH;
                if (i === 0) tsCtx.moveTo(x, y);
                else tsCtx.lineTo(x, y);
            });
            tsCtx.stroke();

            // Area fill
            tsCtx.lineTo(pad.left + plotW, h - pad.bottom);
            tsCtx.lineTo(pad.left, h - pad.bottom);
            tsCtx.closePath();
            tsCtx.fillStyle = s.color + '15';
            tsCtx.fill();
        });
    }

    // ======================================================================
    // CANVAS RESIZE
    // ======================================================================
    function resizeCanvases() {
        [clusterCanvas, heatmapCanvas, tsCanvas].forEach(c => {
            const rect = c.getBoundingClientRect();
            c.width = rect.width * window.devicePixelRatio;
            c.height = rect.height * window.devicePixelRatio;
            c.getContext('2d').scale(window.devicePixelRatio, window.devicePixelRatio);
        });
        initNodePositions();
    }

    // ======================================================================
    // API CALLS
    // ======================================================================
    async function startTraining(agentType) {
        try {
            const res = await fetch(`/api/start?agent_type=${agentType}&steps=50000`, { method: 'POST' });
            const data = await res.json();
            console.log('Start:', data);
            // Reset tracking
            actionCounts = new Array(9).fill(0);
            totalActions = 0;
            for (const k in history) history[k] = [];
        } catch (e) { console.error(e); }
    }

    async function stopTraining() {
        try {
            await fetch('/api/stop', { method: 'POST' });
        } catch (e) { console.error(e); }
    }

    // ======================================================================
    // ANIMATION LOOP
    // ======================================================================
    function animate() {
        drawClusterMap();
        drawHeatmap();
        drawTimeSeries();
        requestAnimationFrame(animate);
    }

    // ======================================================================
    // INIT
    // ======================================================================
    window.addEventListener('resize', resizeCanvases);
    resizeCanvases();
    connectWS();
    animate();
    </script>
</body>
</html>
